<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)">

<div class="card" style="max-width:480px;width:100%;margin:24px;text-align:center;border-top:4px solid var(--accent2)">
  <div class="card-body" style="padding:48px 40px">
    <div style="width:80px;height:80px;border-radius:50%;background:rgba(0,201,122,.12);color:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:2.5rem;margin:0 auto 24px">âœ“</div>
    <h1 style="font-family:var(--font-head);font-size:2.5rem;margin-bottom:8px">Payment Successful!</h1>
    <p style="color:var(--muted);margin-bottom:28px;font-size:1.05rem">Welcome to UltimateEdge PRO ðŸŽ‰<br>Your subscription is now active.</p>
    <div id="plan-details" style="background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:16px;margin-bottom:28px;text-align:left">
      <div style="font-size:.8rem;color:var(--muted);margin-bottom:4px">Active Plan</div>
      <div id="plan-name" style="font-weight:700;font-size:1.1rem">â€”</div>
      <div id="expiry-date" style="font-size:.85rem;color:var(--muted);margin-top:4px">â€”</div>
    </div>
    <a href="dashboard.html" class="btn btn-primary btn-block btn-lg">Go to My Dashboard</a>
  </div>
</div>

<div id="toast"></div>
<script src="js/auth.js"></script>
<script src="js/ai-engine.js"></script>
<script src="js/paystack.js"></script>
<script src="js/app.js"></script>
<script>
  // Read Paystack reference from URL and confirm payment
  document.addEventListener('DOMContentLoaded', async () => {
    const params = new URLSearchParams(location.search);
    const ref    = params.get('reference') || params.get('trxref');
    const plan   = params.get('plan') || 'monthly';

    if (!ref) {
      document.getElementById('plan-details').innerHTML =
        '<p style="color:var(--muted)">No payment reference found. If you completed a payment, it will be processed shortly.</p>';
      return;
    }

    // Wait for auth
    let attempts = 0;
    while ((typeof currentUser === 'undefined' || !currentUser) && attempts++ < 40) {
      await new Promise(r => setTimeout(r, 250));
    }

    if (!currentUser) return; // Not logged in â€” profile update handled by webhook

    // Confirm payment via handlePaymentSuccess
    const planDays = { monthly: 30, threeMonth: 90, annual: 365 };
    const planLabels = { monthly: 'Monthly Plan (â‚¦1,500)', threeMonth: '3-Month Plan (â‚¦3,500)', annual: 'Annual Plan (â‚¦10,000)' };
    const expiryDate = new Date();
    expiryDate.setDate(expiryDate.getDate() + (planDays[plan] || 30));

    document.getElementById('plan-name').textContent = planLabels[plan] || plan;
    document.getElementById('expiry-date').textContent = 'Active until ' + expiryDate.toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });

    // Update DB
    await handlePaymentSuccess({ reference: ref, customer: {} }, plan);
  });
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .catch(err => console.warn('SW registration failed:', err));
    });
  }
</script>
</body>
</html>
