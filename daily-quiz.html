<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Daily Quiz &mdash; UE School</title>
<link rel="stylesheet" href="css/main.css">
<style>
body { background: var(--bg); min-height: 100vh; }

/* ── NAV ── */
.ue-nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); height: 64px; display: flex; align-items: center; }
.ue-nav .container { display: flex; align-items: center; justify-content: space-between; height: 100%; }
.nav-logo { font-family: var(--font-head); font-size: 1.5rem; color: var(--accent); letter-spacing: .07em; }

/* ── HERO ── */
.quiz-hero {
  background: linear-gradient(135deg, #0f1c3f 0%, #1a3a8f 100%);
  padding: 48px 0 40px; text-align: center; color: #fff; position: relative; overflow: hidden;
}
.quiz-hero::before {
  content: ''; position: absolute; inset: 0;
  background-image: linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
                    linear-gradient(90deg,rgba(255,255,255,.04) 1px, transparent 1px);
  background-size: 40px 40px; pointer-events: none;
}
.quiz-hero h1 { font-family: var(--font-head); font-size: clamp(1.8rem,5vw,2.8rem); margin-bottom: 10px; position: relative; }
.quiz-hero p { color: rgba(255,255,255,.7); font-size: .95rem; max-width: 420px; margin: 0 auto 20px; line-height: 1.6; position: relative; }
.streak-pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
  border-radius: 999px; padding: 6px 18px; font-size: .85rem; font-weight: 700;
  position: relative;
}
.countdown-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(245,158,11,.2); border: 1px solid rgba(245,158,11,.4);
  border-radius: 999px; padding: 5px 14px; font-size: .82rem; font-weight: 700; color: #fbbf24;
  margin-left: 10px; position: relative;
}

/* ── QUIZ CARD ── */
.quiz-wrap { max-width: 600px; margin: 0 auto; padding: 32px 16px 60px; }

.quiz-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 16px; padding: 28px; box-shadow: var(--shadow-lg);
}

.q-progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.q-progress-track { flex: 1; height: 6px; background: var(--border); border-radius: 999px; overflow: hidden; }
.q-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #6366f1); border-radius: 999px; transition: width .4s ease; }
.q-counter { font-size: .78rem; font-weight: 700; color: var(--muted); white-space: nowrap; }

.q-subject-tag { display: inline-block; background: var(--accent-glow); color: var(--accent); font-size: .72rem; font-weight: 700; padding: 3px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 14px; }
.q-text { font-size: 1.05rem; font-weight: 700; color: var(--text); line-height: 1.55; margin-bottom: 22px; }

.q-options { display: flex; flex-direction: column; gap: 10px; }
.q-option {
  width: 100%; display: flex; align-items: center; gap: 0;
  border: 1.5px solid var(--border2); border-radius: 10px;
  cursor: pointer; font-family: inherit; font-size: .9rem; font-weight: 500;
  color: var(--text); text-align: left; transition: all .15s; overflow: hidden; background: #fff;
}
.q-option:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-glow); }
.opt-lbl { display: flex; align-items: center; justify-content: center; min-width: 44px; height: 48px; background: var(--bg); border-right: 1.5px solid var(--border2); font-weight: 800; font-size: .85rem; color: var(--muted); transition: all .15s; flex-shrink: 0; }
.opt-txt { padding: 12px 16px; flex: 1; }
.q-option.correct { border-color: #16a34a; background: #f0fdf4; }
.q-option.correct .opt-lbl { background: #16a34a; color: #fff; border-right-color: #16a34a; }
.q-option.wrong { border-color: #dc2626; background: #fef2f2; }
.q-option.wrong .opt-lbl { background: #dc2626; color: #fff; border-right-color: #dc2626; }
.q-option.show-correct { border-color: #16a34a; background: #f0fdf4; opacity: .7; }
.q-option.show-correct .opt-lbl { background: #16a34a; color: #fff; border-right-color: #16a34a; }
.q-option:disabled { cursor: default; }

.explanation-box {
  display: none; margin-top: 14px; padding: 12px 16px;
  background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 10px;
  font-size: .85rem; color: #1e40af; line-height: 1.6;
}
.explanation-box.show { display: block; }

.q-nav { display: flex; justify-content: flex-end; margin-top: 18px; }
.btn-next { padding: 11px 28px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-family: inherit; font-size: .9rem; font-weight: 700; cursor: pointer; transition: all .15s; display: none; }
.btn-next:hover { filter: brightness(1.08); transform: translateY(-1px); }

/* ── LOCKED OVERLAY ── */
.quiz-locked {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 16px; padding: 40px 28px; text-align: center;
  box-shadow: var(--shadow-lg);
}
.quiz-locked h2 { font-family: var(--font-head); font-size: 1.8rem; margin-bottom: 10px; }
.quiz-locked p { color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
.countdown-big { font-family: var(--font-mono); font-size: 2rem; font-weight: 700; color: var(--accent); margin: 16px 0; }

/* ── RESULTS CARD ── */
.results-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 16px; padding: 32px; box-shadow: var(--shadow-lg);
}
.results-score-ring {
  width: 100px; height: 100px; border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: var(--font-head); font-size: 1.8rem; font-weight: 700;
  margin: 0 auto 20px; border: 4px solid;
}
.results-score-ring.pass { border-color: #16a34a; color: #16a34a; background: #f0fdf4; }
.results-score-ring.ok   { border-color: #d97706; color: #d97706; background: #fffbeb; }
.results-score-ring.fail { border-color: #dc2626; color: #dc2626; background: #fef2f2; }

.results-breakdown { margin: 20px 0; }
.topic-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.topic-bar-label { font-size: .82rem; font-weight: 600; min-width: 110px; color: var(--text); }
.topic-bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 999px; overflow: hidden; }
.topic-bar-fill { height: 100%; border-radius: 999px; }
.fill-good { background: #16a34a; }
.fill-mid  { background: #d97706; }
.fill-poor { background: #dc2626; }
.topic-bar-pct { font-size: .78rem; font-weight: 700; font-family: var(--font-mono); min-width: 36px; text-align: right; }

/* ── PREMIUM UPSELL ── */
.upsell-card {
  margin-top: 28px; background: linear-gradient(135deg, #1a56ff, #6366f1);
  border-radius: 16px; padding: 28px; color: #fff; text-align: center;
}
.upsell-card h3 { font-family: var(--font-head); font-size: 1.4rem; margin-bottom: 8px; }
.upsell-card p { opacity: .85; font-size: .9rem; margin-bottom: 20px; line-height: 1.6; }
.upsell-features { list-style: none; text-align: left; margin-bottom: 22px; display: flex; flex-direction: column; gap: 8px; }
.upsell-features li { display: flex; align-items: center; gap: 10px; font-size: .88rem; }
.upsell-check { color: #86efac; font-size: 1rem; flex-shrink: 0; }
</style>
</head>
<body>

<nav class="ue-nav">
  <div class="container">
    <a href="index.html" class="nav-logo">UE School</a>
    <div style="display:flex;align-items:center;gap:10px">
      <a href="login.html" class="btn btn-outline btn-sm" id="nav-login-btn">Login</a>
      <a href="pricing.html" class="btn btn-primary btn-sm">Get Premium</a>
    </div>
  </div>
</nav>

<div class="quiz-hero">
  <div class="container">
    <h1>&#x26A1; Free Daily Quiz</h1>
    <p>10 standard exam questions. Refresh every 24 hours. See exactly where you stand.</p>
    <div>
      <span class="streak-pill" id="streak-pill">&#x1F525; Day <span id="streak-count">1</span> streak</span>
      <span class="countdown-pill" id="refresh-pill" style="display:none">Refreshes in <span id="countdown-timer">--:--:--</span></span>
    </div>
  </div>
</div>

<div class="quiz-wrap" id="quiz-wrap">
  <!-- Content injected by JS -->
  <div style="text-align:center;padding:60px 0;color:var(--muted)">
    <div class="load-spinner" style="width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px"></div>
    <div>Loading your quiz…</div>
  </div>
</div>

<div id="toast"></div>

<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script src="js/gdrive-video.js"></script>
<script src="js/gsheet-questions.js"></script>
<script src="js/questions.js"></script>

<script>
'use strict';

// ── CONSTANTS ──────────────────────────────────────────────────────
const QUIZ_SIZE      = 10;
const REFRESH_HOURS  = 24;
const STORAGE_KEY    = 'ue_daily_quiz';

// ── STATE ──────────────────────────────────────────────────────────
let questions   = [];
let currentQ    = 0;
let answers     = {};
let answered    = false;
let quizDone    = false;

// ── COOKIE / LOCALSTORAGE STATE ────────────────────────────────────
function getQuizState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveQuizState(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}

function isLocked() {
  const state = getQuizState();
  if (!state || !state.completedAt) return false;
  const elapsed = Date.now() - state.completedAt;
  return elapsed < REFRESH_HOURS * 3600 * 1000;
}

function getTimeUntilRefresh() {
  const state = getQuizState();
  if (!state || !state.completedAt) return 0;
  const refreshAt = state.completedAt + REFRESH_HOURS * 3600 * 1000;
  return Math.max(0, refreshAt - Date.now());
}

function getStreak() {
  const state = getQuizState();
  return state?.streak || 0;
}

// ── COUNTDOWN TIMER ────────────────────────────────────────────────
function startCountdown() {
  const el = document.getElementById('countdown-timer');
  const pill = document.getElementById('refresh-pill');
  if (!el) return;
  pill.style.display = 'inline-flex';

  function update() {
    const ms = getTimeUntilRefresh();
    if (ms <= 0) { location.reload(); return; }
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    el.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  update();
  setInterval(update, 1000);
}

// ── RENDER LOCKED STATE ────────────────────────────────────────────
function renderLocked() {
  const streak = getStreak();
  startCountdown();
  document.getElementById('streak-count').textContent = streak;

  document.getElementById('quiz-wrap').innerHTML = `
    <div class="quiz-locked">
      <div style="font-size:3rem;margin-bottom:12px">\uD83D\uDCC5</div>
      <h2>You've completed today's quiz!</h2>
      <p>Your next 10 questions will be ready in:</p>
      <div class="countdown-big" id="locked-countdown">--:--:--</div>
      <p style="font-size:.85rem;margin-bottom:24px">Come back every day to keep your streak alive and track your improvement.</p>
      <a href="pricing.html" class="btn btn-primary btn-lg" style="width:100%;margin-bottom:12px">
        \uD83D\uDE80 Unlock Unlimited Practice
      </a>
      <a href="index.html" class="btn btn-outline" style="width:100%">Back to Home</a>
    </div>
    ${buildUpsellCard()}
  `;

  // Second countdown inside locked view
  const lockedEl = document.getElementById('locked-countdown');
  if (lockedEl) {
    function updateLocked() {
      const ms = getTimeUntilRefresh();
      if (ms <= 0) { location.reload(); return; }
      const h = Math.floor(ms/3600000);
      const m = Math.floor((ms%3600000)/60000);
      const s = Math.floor((ms%60000)/1000);
      lockedEl.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    updateLocked();
    setInterval(updateLocked, 1000);
  }
}

// ── RENDER QUIZ ────────────────────────────────────────────────────
function renderQuestion() {
  answered = false;
  const q   = questions[currentQ];
  const pct = Math.round((currentQ / questions.length) * 100);

  document.getElementById('quiz-wrap').innerHTML = `
    <div class="quiz-card">
      <div class="q-progress-row">
        <div class="q-progress-track">
          <div class="q-progress-fill" style="width:${pct}%"></div>
        </div>
        <div class="q-counter">Question ${currentQ + 1} of ${questions.length}</div>
      </div>
      <div class="q-subject-tag">${capitalize(q.subject)} \u2022 ${q.examType}</div>
      <div class="q-text">${q.text}</div>
      <div class="q-options" id="q-options">
        ${q.opts.map((opt, i) => `
          <button class="q-option" data-idx="${i}" onclick="selectAnswer(${i})">
            <span class="opt-lbl">${String.fromCharCode(65+i)}</span>
            <span class="opt-txt">${opt}</span>
          </button>
        `).join('')}
      </div>
      <div class="explanation-box" id="explanation-box"></div>
      <div class="q-nav">
        <button class="btn-next" id="btn-next" onclick="nextQuestion()">
          ${currentQ < questions.length - 1 ? 'Next \u2192' : 'See Results'}
        </button>
      </div>
    </div>
  `;
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  answers[currentQ] = idx;

  const q    = questions[currentQ];
  const opts = document.querySelectorAll('.q-option');

  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add(idx === q.ans ? 'correct' : 'show-correct');
    if (i === idx && idx !== q.ans) btn.classList.add('wrong');
  });

  // Show explanation
  if (q.explanation) {
    const eb = document.getElementById('explanation-box');
    eb.innerHTML = '<strong>Explanation:</strong> ' + q.explanation;
    eb.classList.add('show');
  }

  document.getElementById('btn-next').style.display = 'block';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

// ── RESULTS ────────────────────────────────────────────────────────
function showResults() {
  quizDone = true;

  // Tally results
  let correct = 0;
  const topicStats = {};

  questions.forEach((q, i) => {
    const isCorrect = answers[i] === q.ans;
    if (isCorrect) correct++;
    const key = q.subject + '.' + (q.topic || q.subject);
    if (!topicStats[key]) topicStats[key] = { correct: 0, total: 0, label: q.topic || capitalize(q.subject) };
    topicStats[key].total++;
    if (isCorrect) topicStats[key].correct++;
  });

  const pct   = Math.round((correct / questions.length) * 100);
  const grade = pct >= 70 ? 'pass' : pct >= 50 ? 'ok' : 'fail';
  const msg   = pct >= 70
    ? "Great performance! You're on track."
    : pct >= 50
    ? 'Fair result. Focus on the weak topics below.'
    : 'Keep practising \u2014 you can improve quickly!';

  // Identify strengths and weaknesses
  const sorted = Object.values(topicStats).sort((a,b) =>
    (b.correct/b.total) - (a.correct/a.total)
  );
  const strong = sorted.filter(t => t.correct/t.total >= 0.7);
  const weak   = sorted.filter(t => t.correct/t.total < 0.5);

  // Save streak
  const prevState = getQuizState();
  const prevStreak = prevState?.streak || 0;
  const lastDate = prevState?.completedAt;
  const oneDayAgo = Date.now() - 26 * 3600 * 1000; // 26hr window for flexibility
  const newStreak = lastDate && lastDate > oneDayAgo ? prevStreak + 1 : 1;
  saveQuizState({ completedAt: Date.now(), score: pct, streak: newStreak });
  document.getElementById('streak-count').textContent = newStreak;
  startCountdown();

  // Topic bars HTML
  const barsHTML = sorted.map(t => {
    const p = Math.round((t.correct/t.total)*100);
    const cls = p >= 70 ? 'fill-good' : p >= 50 ? 'fill-mid' : 'fill-poor';
    return `
      <div class="topic-bar-row">
        <div class="topic-bar-label">${t.label}</div>
        <div class="topic-bar-track"><div class="topic-bar-fill ${cls}" style="width:${p}%"></div></div>
        <div class="topic-bar-pct">${p}%</div>
      </div>`;
  }).join('');

  const weakSuggestion = weak.length > 0
    ? `<div style="margin-top:20px;padding:14px 16px;background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;font-size:.88rem;color:#92400e">
        <strong>\uD83C\uDFAF Focus areas:</strong> ${weak.map(t=>t.label).join(', ')}.
        Premium includes video lessons and study guides for each of these topics.
       </div>`
    : '';

  document.getElementById('quiz-wrap').innerHTML = `
    <div class="results-card">
      <div class="results-score-ring ${grade}">
        <div>${pct}%</div>
        <div style="font-size:.7rem;font-family:var(--font-body);font-weight:600">${correct}/${questions.length}</div>
      </div>
      <h3 style="font-family:var(--font-head);font-size:1.6rem;text-align:center;margin-bottom:6px">
        ${pct >= 70 ? '\uD83C\uDF89 ' : pct >= 50 ? '\uD83D\uDC4D ' : '\uD83D\uDCDA '}${pct >= 70 ? 'Excellent!' : pct >= 50 ? 'Good Effort!' : 'Keep Practising'}
      </h3>
      <p style="text-align:center;color:var(--muted);font-size:.9rem;margin-bottom:24px">${msg}</p>

      <h4 style="font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:12px">Topic Breakdown</h4>
      <div class="results-breakdown">${barsHTML}</div>
      ${weakSuggestion}

      <div style="display:flex;gap:10px;margin-top:22px;flex-wrap:wrap">
        <a href="index.html" class="btn btn-outline" style="flex:1;min-width:120px">\uD83C\uDFE0 Home</a>
        <a href="pricing.html" class="btn btn-primary" style="flex:2;min-width:180px">\uD83D\uDE80 Unlock Full Access</a>
      </div>
    </div>
    ${buildUpsellCard(weak)}
  `;
}

// ── UPSELL CARD ────────────────────────────────────────────────────
function buildUpsellCard(weakTopics) {
  const weakText = weakTopics && weakTopics.length > 0
    ? `We detected weak areas in <strong>${weakTopics.slice(0,2).map(t=>t.label).join(' and ')}</strong>. Premium has dedicated video lessons and study guides to fix these gaps fast.`
    : `Premium unlocks unlimited CBT practice, expert video lessons, SmartPath\u2122 AI guidance, and weekly performance reports.`;

  return `
    <div class="upsell-card">
      <div style="font-size:2.2rem;margin-bottom:10px">\uD83C\uDFAB</div>
      <h3>Want to go further?</h3>
      <p>${weakText}</p>
      <ul class="upsell-features">
        <li><span class="upsell-check">\u2713</span> Unlimited CBT practice \u2014 all subjects, all topics</li>
        <li><span class="upsell-check">\u2713</span> 200+ expert video masterclasses</li>
        <li><span class="upsell-check">\u2713</span> SmartPath\u2122 AI \u2014 personalized weak-topic drills</li>
        <li><span class="upsell-check">\u2713</span> JAMB score prediction after every session</li>
        <li><span class="upsell-check">\u2713</span> PDF study guides per subject</li>
      </ul>
      <a href="pricing.html" class="btn" style="background:#fff;color:var(--accent);width:100%;height:46px;font-weight:700;font-size:.95rem">
        Start from \u20A61,500/month \u2192
      </a>
      <p style="font-size:.78rem;opacity:.65;margin-top:10px">No hidden fees. Cancel anytime.</p>
    </div>
  `;
}

function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

// ── INIT ───────────────────────────────────────────────────────────
(async () => {
  // Update nav if user is logged in
  if (window.sb) {
    const { data: { session } } = await window.sb.auth.getSession();
    if (session) {
      const loginBtn = document.getElementById('nav-login-btn');
      if (loginBtn) { loginBtn.textContent = 'Dashboard'; loginBtn.href = 'dashboard.html'; }
    }
  }

  // Update streak display
  document.getElementById('streak-count').textContent = getStreak() || 1;

  // Check if today's quiz already completed
  if (isLocked()) {
    renderLocked();
    return;
  }

  // Load 10 questions \u2014 mix of subjects from the question bank
  const subjects = ['mathematics','english','physics','chemistry','biology','economics','government'];
  const perSubj = Math.ceil(QUIZ_SIZE / subjects.length);
  let pool = [];
  for (const s of subjects) {
    const qs = await QUESTION_BANK.getQuestions({ subject: s, count: 2 });
    pool = pool.concat(qs);
    if (pool.length >= QUIZ_SIZE * 2) break;
  }

  // Shuffle and take exactly 10
  pool = pool.sort(() => Math.random() - 0.5).slice(0, QUIZ_SIZE);

  // Seed with today's date so same-day reloads get same questions
  const today = new Date().toDateString();
  const seed  = today.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const seeded = [...pool].sort((a,b)=>((seed*a.id.length)%7)-((seed*b.id.length)%7));
  questions = seeded;

  renderQuestion();
})();
</script>
