<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classroom — UE School</title>

<!-- ╔══════════════════════════════════════════════════════╗
     ║  SECURITY BLOCK — must be first in <head>           ║
     ╚══════════════════════════════════════════════════════╝ -->
<script src="js/config.js"></script>
<script src="js/head-gatekeeper.js"></script>
<!-- END SECURITY BLOCK -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4ff;--surface:#fff;--surface2:#e8f0fe;--surface3:#d6e4fd;
  --border:rgba(79,142,255,.12);--border2:rgba(79,142,255,.22);
  --accent:#2563eb;--accent2:#0ea5e9;--accent3:#f97316;
  --muted:#6b7280;--muted2:#4b5563;--text:#0f1c3f;--text2:#1e3a6e;
  --font-head:'Syne',"Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji",sans-serif;--font-body:'DM Sans',"Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji",sans-serif;
  --radius:12px;--radius-lg:18px;--glow:0 0 40px rgba(37,99,235,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;height:100vh;overflow:hidden;
  background-image:radial-gradient(ellipse 80% 50% at 20% -10%,rgba(37,99,235,.08) 0%,transparent 60%),
  radial-gradient(ellipse 60% 40% at 80% 110%,rgba(14,165,233,.06) 0%,transparent 60%)}

#defaulter-banner{background:linear-gradient(90deg,#7c2d12,#9a3412,#7c2d12);background-size:200% 100%;animation:bannerShift 4s linear infinite;color:#fde8d0;font-family:var(--font-body);font-size:.78rem;font-weight:500;letter-spacing:.02em;text-align:center;padding:8px 20px;flex-shrink:0;display:none}
#defaulter-banner a{color:#fed7aa;font-weight:700;text-decoration:none;border-bottom:1px solid rgba(253,215,170,.4);margin-left:6px;transition:color .2s}
#defaulter-banner a:hover{color:#fff}
@keyframes bannerShift{0%{background-position:0% 50%}100%{background-position:200% 50%}}

header{flex-shrink:0;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:relative;z-index:50}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(37,99,235,.3),transparent)}
.nav-inner{height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.nav-left{display:flex;align-items:center;gap:14px}
.btn-icon{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:9px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:1.3rem;line-height:1;text-decoration:none;transition:background .2s,border-color .2s,transform .15s;cursor:pointer}
.btn-icon:hover{background:var(--surface3);border-color:rgba(79,142,255,.3);transform:translateX(-2px)}
.nav-logo{font-family:'Inter',"Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji",sans-serif;font-size:.95rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;color:var(--text);background:linear-gradient(135deg,#0f1c3f 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.subject-tabs{display:flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:4px}
.subject-tab{font-family:var(--font-body);font-size:.78rem;font-weight:500;color:var(--muted2);background:transparent;border:none;padding:6px 14px;border-radius:7px;cursor:pointer;transition:all .2s;white-space:nowrap;letter-spacing:.01em}
.subject-tab:hover{color:var(--text);background:var(--surface3)}
.subject-tab.active{background:linear-gradient(135deg,rgba(37,99,235,.15),rgba(37,99,235,.08));color:#1d4ed8;border:1px solid rgba(37,99,235,.3);font-weight:600}

.classroom-layout{flex:1;display:grid;grid-template-columns:280px 1fr;overflow:hidden;min-height:0}

.classroom-sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:20px 18px 16px;border-bottom:1px solid var(--border);background:var(--surface2)}
.sidebar-head h2{font-family:var(--font-head);font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:4px}
.sidebar-meta{font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:6px}
.sidebar-meta::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent2);box-shadow:0 0 6px var(--accent2)}
#topic-list{flex:1;overflow-y:auto;padding:10px;scrollbar-width:thin;scrollbar-color:var(--surface3) transparent}
#topic-list::-webkit-scrollbar{width:4px}
#topic-list::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}
.topic-item{display:flex;align-items:center;gap:10px;width:100%;background:transparent;border:1px solid transparent;border-radius:9px;padding:10px 12px;text-align:left;cursor:pointer;transition:all .2s;color:var(--text2);font-family:var(--font-body);font-size:.82rem;font-weight:400;margin-bottom:3px;position:relative}
.topic-item:hover:not(.locked){background:var(--surface2);border-color:var(--border2);color:var(--text)}
.topic-item.active{background:linear-gradient(135deg,rgba(37,99,235,.12),rgba(37,99,235,.05));border-color:rgba(37,99,235,.3);color:#1d4ed8;font-weight:600}
.topic-item.active::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:3px;background:var(--accent);border-radius:0 3px 3px 0;box-shadow:0 0 8px var(--accent)}
.topic-item.locked{opacity:.5;cursor:not-allowed}
.topic-text{flex:1}

.classroom-main{overflow-y:auto;padding:28px 32px;background:var(--bg);scrollbar-width:thin;scrollbar-color:var(--surface3) transparent}
.classroom-main::-webkit-scrollbar{width:5px}
.classroom-main::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}
.content-inner{max-width:760px;margin:0 auto;animation:fadeUp .5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.video-area{width:100%;aspect-ratio:16/9;background:var(--surface2);border-radius:var(--radius-lg);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer;box-shadow:0 8px 40px rgba(0,0,0,.5),var(--glow);transition:transform .3s,box-shadow .3s}
.video-area:hover{transform:scale(1.005);box-shadow:0 12px 60px rgba(0,0,0,.6),0 0 60px rgba(79,142,255,.2)}
.video-area::before,.video-area::after{content:'';position:absolute;left:0;right:0;height:18%;background:linear-gradient(180deg,rgba(240,244,255,.9),transparent);z-index:1;pointer-events:none}
.video-area::before{top:0}
.video-area::after{bottom:0;background:linear-gradient(0deg,rgba(240,244,255,.9),transparent)}
.video-bg{position:absolute;inset:0;background:linear-gradient(135deg,#c7d9f8,#dbeafe,#bfdbfe);background-size:300% 300%;animation:videoBgShift 8s ease infinite}
@keyframes videoBgShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.video-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(37,99,235,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,.07) 1px,transparent 1px);background-size:40px 40px}
.video-play-btn{position:relative;z-index:2;width:72px;height:72px;background:linear-gradient(135deg,rgba(79,142,255,.9),rgba(99,102,241,.8));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:#fff;box-shadow:0 0 0 12px rgba(79,142,255,.12),0 8px 24px rgba(79,142,255,.4);transition:transform .25s,box-shadow .25s;padding-left:5px}
.video-area:hover .video-play-btn{transform:scale(1.1);box-shadow:0 0 0 18px rgba(79,142,255,.1),0 12px 32px rgba(79,142,255,.5)}
.video-play-btn::before{content:'';position:absolute;inset:-12px;border-radius:50%;border:2px solid rgba(79,142,255,.3);animation:pulse-ring 2.5s ease-out infinite}
@keyframes pulse-ring{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.6);opacity:0}}
.video-duration{position:absolute;bottom:14px;right:16px;z-index:3;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);color:var(--text2);font-size:.72rem;font-weight:600;padding:4px 10px;border-radius:6px;border:1px solid var(--border2);letter-spacing:.04em}
.video-locked{position:absolute;inset:0;z-index:5;background:rgba(240,244,255,.92);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
.video-locked h3{font-family:var(--font-head);font-size:1.6rem;font-weight:800;margin-bottom:8px}
.video-locked p{color:rgba(15,28,63,.55);margin-bottom:22px;font-size:.9rem}

.lesson-meta-row{display:flex;align-items:center;gap:10px;margin:22px 0 10px}
.topic-tag{background:rgba(37,99,235,.1);color:#1d4ed8;font-size:.72rem;font-weight:700;padding:4px 12px;border-radius:20px;border:1px solid rgba(37,99,235,.2);letter-spacing:.05em;text-transform:uppercase}
.lesson-duration{color:var(--muted);font-size:.78rem;display:flex;align-items:center;gap:5px}
.lesson-duration::before{content:'◷';color:var(--muted2);font-size:.85rem}
.topic-title{font-family:var(--font-head);font-size:2.2rem;font-weight:800;color:var(--text);line-height:1.15;margin-bottom:20px;letter-spacing:-.02em}

.btn-row{display:flex;gap:12px;padding-bottom:26px;border-bottom:1px solid var(--border);margin-bottom:28px}
.btn{font-family:var(--font-body);font-size:.85rem;font-weight:600;border:none;border-radius:10px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px;letter-spacing:.01em;text-decoration:none}
.btn-lg{padding:11px 24px;font-size:.9rem}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;box-shadow:0 4px 20px rgba(79,142,255,.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(79,142,255,.45);filter:brightness(1.08)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-outline:hover{background:var(--surface2);color:var(--text)}

#lesson-content p{font-size:1rem;line-height:1.85;color:var(--text2);margin-bottom:24px}
#lesson-content h3{font-family:var(--font-head);font-size:1.25rem;font-weight:700;color:var(--text);margin-bottom:16px;margin-top:8px}
#lesson-content ul{list-style:none;display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
#lesson-content ul li{display:flex;gap:12px;align-items:flex-start;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text2);font-size:.92rem;line-height:1.6;transition:border-color .2s,background .2s}
#lesson-content ul li:hover{border-color:rgba(79,142,255,.25);background:var(--surface3)}
#lesson-content ul li .bullet{color:var(--accent);font-size:1.1rem;margin-top:1px;flex-shrink:0}

.formula-box{background:linear-gradient(135deg,rgba(219,234,254,.9),rgba(191,219,254,.7));border:1px solid rgba(37,99,235,.2);border-radius:var(--radius-lg);padding:22px 24px;margin-bottom:28px;position:relative;overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 4px 24px rgba(37,99,235,.08)}
.formula-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.formula-box-label{text-transform:uppercase;font-size:.68rem;font-weight:700;color:var(--accent);letter-spacing:.1em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.formula-box-label::before{content:'fx';background:rgba(79,142,255,.15);border:1px solid rgba(79,142,255,.25);color:var(--accent);font-family:var(--font-head);font-size:.7rem;padding:2px 7px;border-radius:5px}
.formula-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.formula-item{background:rgba(255,255,255,.7);border:1px solid var(--border);border-radius:9px;padding:12px 16px;font-size:.95rem;color:var(--text);font-family:'DM Mono','Courier New',monospace;letter-spacing:.02em;transition:background .2s,border-color .2s}
.formula-item:hover{background:rgba(37,99,235,.08);border-color:rgba(37,99,235,.25)}

#quiz-section{padding-top:32px;border-top:1px solid var(--border)}
.card-body{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:24px;box-shadow:0 4px 24px rgba(37,99,235,.07)}
#quiz-q-num-row{font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:10px;text-transform:uppercase;letter-spacing:.06em}
.quiz-dots{display:flex;gap:5px}
.quiz-dot{width:7px;height:7px;border-radius:50%;background:var(--surface3);border:1px solid var(--border2);transition:background .3s}
.quiz-dot.done{background:var(--accent2);border-color:var(--accent2)}
.quiz-dot.active{background:var(--accent);border-color:var(--accent);box-shadow:0 0 6px var(--accent)}
#quiz-question{font-size:1.1rem;font-weight:700;margin-bottom:22px;color:var(--text);line-height:1.5;font-family:var(--font-head)}
#quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.drill-option{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:13px 16px;text-align:left;cursor:pointer;font-family:var(--font-body);font-size:.88rem;color:var(--text2);font-weight:400;transition:all .2s;display:flex;align-items:center;gap:10px}
.drill-option:hover{background:var(--surface3);border-color:rgba(79,142,255,.35);color:var(--text);transform:translateY(-1px)}
.drill-option.selected{border-color:rgba(37,99,235,.5);background:rgba(37,99,235,.1);color:#1d4ed8}
.opt-label{font-family:var(--font-head);font-size:.72rem;font-weight:700;color:var(--muted);background:var(--surface3);border-radius:5px;padding:2px 7px;flex-shrink:0;letter-spacing:.03em}

#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(15,28,63,.92);backdrop-filter:blur(16px);border:1px solid var(--border2);color:#fff;font-family:var(--font-body);font-size:.85rem;font-weight:500;padding:12px 22px;border-radius:30px;box-shadow:0 8px 32px rgba(37,99,235,.25);opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:9999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

#sidebar-toggle{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:9px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:1.1rem;cursor:pointer;transition:background .2s}
#sidebar-toggle:hover{background:var(--surface3)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(15,28,63,.35);backdrop-filter:blur(3px);z-index:100;opacity:0;transition:opacity .25s}
.sidebar-overlay.open{opacity:1}

@media(max-width:720px){
  body{height:auto!important;overflow:visible!important;overflow-x:hidden}
  .classroom-layout{grid-template-columns:1fr;overflow:visible!important;min-height:0}
  .classroom-main{overflow-y:visible!important;padding:18px 16px 60px}
  .classroom-sidebar{position:fixed;top:0;left:0;bottom:0;width:280px;z-index:110;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:4px 0 32px rgba(37,99,235,.12)}
  .classroom-sidebar.drawer-open{transform:translateX(0)}
  .sidebar-overlay{display:block;pointer-events:none}
  .sidebar-overlay.open{pointer-events:auto}
  #sidebar-toggle{display:flex}
  .topic-title{font-size:1.5rem}
  .subject-tabs{gap:2px;overflow-x:auto;scrollbar-width:none;max-width:calc(100vw - 120px)}
  .subject-tabs::-webkit-scrollbar{display:none}
  .subject-tab{padding:5px 10px;font-size:.72rem;white-space:nowrap}
  .formula-grid{grid-template-columns:1fr}
  #quiz-options{grid-template-columns:1fr}
  .btn-row{flex-wrap:wrap;gap:10px}
  .btn-lg{padding:10px 18px;font-size:.85rem}
  .nav-inner{padding:0 12px}
  .content-inner{max-width:100%}
  #defaulter-banner{font-size:.72rem;padding:7px 14px}
}
@media(max-width:400px){
  .subject-tab{padding:5px 8px;font-size:.68rem}
  .topic-title{font-size:1.3rem}
}
</style>
</head>
<body>

<div id="defaulter-banner">Your subscription has expired. <a href="pricing.html">Renew Now</a></div>

<header>
  <div class="nav-inner">
    <div class="nav-left">
      <button id="sidebar-toggle" title="Topics" onclick="CLASSROOM.toggleSidebar()">☰</button>
      <a href="dashboard.html" class="btn-icon" title="Back to Dashboard">&#8249;</a>
      <a href="index.html" class="nav-logo">UE School</a>
    </div>
    <div class="subject-tabs" id="subject-tabs">
      <button class="subject-tab active" data-subject="mathematics"
        onclick="CLASSROOM.switchSubject('mathematics',this)">Mathematics</button>
    </div>
    <div style="width:40px"></div>
  </div>
</header>

<div class="classroom-layout">
  <aside class="classroom-sidebar">
    <div class="sidebar-head">
      <h2 id="sidebar-subject-name">Mathematics</h2>
      <div class="sidebar-meta" id="sidebar-lesson-count">Loading…</div>
    </div>
    <div id="topic-list">
      <div style="padding:20px;text-align:center;color:var(--muted);font-size:.85rem">Loading topics…</div>
    </div>
  </aside>

  <main class="classroom-main">
    <div class="content-inner">
      <div class="video-area" id="video-area">
        <div class="video-bg"></div>
        <div class="video-grid"></div>
        <div class="video-play-btn" onclick="CLASSROOM.playVideo(null)">▶</div>
        <div class="video-duration" id="video-duration-badge">—</div>
      </div>

      <div>
        <div class="lesson-meta-row">
          <span class="topic-tag" id="topic-tag">Topic</span>
          <span class="lesson-duration" id="lesson-duration-badge">— mins</span>
        </div>
        <h1 class="topic-title" id="topic-title">Select a topic</h1>

        <div class="btn-row">
          <a href="cbt.html" class="btn btn-primary btn-lg" id="practice-btn">📝 Practice Questions</a>
          <button class="btn btn-outline btn-lg" onclick="CLASSROOM.nextLesson()">Next Lesson →</button>
          <button class="btn btn-outline btn-lg" onclick="CLASSROOM.prevLesson()" style="padding:11px 16px">← Prev</button>
        </div>

        <div id="lesson-content">
          <p style="color:var(--muted)">Select a topic from the sidebar to begin.</p>
        </div>

        <div id="quiz-section" style="display:none;padding-top:32px;border-top:1px solid var(--border)">
          <h2 style="font-family:var(--font-head);font-size:1.6rem;font-weight:800;margin-bottom:20px">Quick Check</h2>
          <div class="card-body" id="quiz-card">
            <div id="quiz-q-num-row">
              <span>Question <span id="quiz-q-num">1</span> of <span id="quiz-q-total">3</span></span>
              <div class="quiz-dots" id="quiz-dots"></div>
            </div>
            <h3 id="quiz-question" style="font-size:1.1rem;font-weight:700;margin-bottom:22px;color:var(--text);font-family:var(--font-head)"></h3>
            <div id="quiz-options"></div>
          </div>
          <div id="quiz-feedback" style="display:none"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>
<div class="sidebar-overlay" onclick="CLASSROOM.closeSidebar()"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/classroom.js"></script>

<script>
function toast(msg, dur = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

document.addEventListener('DOMContentLoaded', async () => {
  // AUTH_GUARD.init() boots window.sb from UE_CONFIG, validates session,
  // checks premium gate (classroom.html is in PREMIUM_PAGES), renders nav.
  const authData = await AUTH_GUARD.init();
  if (!authData) return; // redirect in progress (no session or not premium)

  await CLASSROOM.init();
});
</script>
</body>
</html>
