<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Classroom — UltimateEdge School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{
  --ink:#0c0c14;--paper:#f8f6f0;--white:#fff;
  --gold:#f0c040;--gold-2:#c99a20;--gold-glow:rgba(240,192,64,.18);
  --green:#16a34a;--green-bg:rgba(22,163,74,.1);
  --red:#dc2626;--red-bg:rgba(220,38,38,.1);
  --slate:#11111c;--slate2:#1a1a2e;
  --muted:#737380;--border:rgba(12,12,20,.08);--border-w:rgba(255,255,255,.1);
  --r:11px;--r-lg:17px;
  --ease:cubic-bezier(.4,0,.2,1);
  --ff-h:'Bebas Neue',sans-serif;
  --ff-b:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--ff-b);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:var(--ff-h);}
a{color:inherit;text-decoration:none;}
button{font-family:var(--ff-b);cursor:pointer;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:var(--r);font-weight:700;font-size:.84rem;border:none;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn-gold{background:var(--gold);color:var(--ink);}
.btn-gold:hover{background:#ffd04a;box-shadow:0 4px 16px var(--gold-glow);}
.btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--border);}
.btn-outline:hover{border-color:var(--ink);}
.btn-sm{padding:6px 14px;font-size:.78rem;}
.btn-full{width:100%;}

/* LAYOUT */
.page{display:flex;flex-direction:column;height:100%;}

/* TOP NAV */
.top-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 max(16px,3vw);height:56px;flex-shrink:0;
  background:rgba(248,246,240,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  position:relative;z-index:100;
}
.nav-logo{font-family:var(--ff-h);font-weight:800;font-size:1.05rem;color:var(--ink);}
.nav-logo .accent{color:var(--gold-2);}
.top-nav-right{display:flex;gap:8px;align-items:center;}

/* MAIN SPLIT */
.classroom-body{display:flex;flex:1;overflow:hidden;min-height:0;}

/* SIDEBAR */
.sidebar{
  width:250px;min-width:250px;flex-shrink:0;
  background:var(--white);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-head{
  padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.sidebar-head h3{font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.subj-tabs{display:flex;gap:5px;flex-wrap:wrap;}
.subj-tab{
  font-size:.74rem;padding:5px 11px;border-radius:20px;
  border:1.5px solid var(--border);background:none;color:var(--muted);
  font-weight:700;cursor:pointer;transition:all .15s;
}
.subj-tab.active{background:var(--gold);border-color:var(--gold);color:var(--ink);}
.topic-scroll{flex:1;overflow-y:auto;padding:8px 0;}
.topic-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;cursor:pointer;
  border-left:3px solid transparent;transition:all .14s;
  font-size:.86rem;gap:8px;
}
.topic-item:hover{background:rgba(12,12,20,.03);}
.topic-item.active{background:rgba(240,192,64,.1);border-left-color:var(--gold);font-weight:700;}
.topic-item .ti-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.topic-item .ti-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mastery-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.badge{font-size:.62rem;font-weight:800;padding:2px 6px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;}
.badge-free{background:var(--green-bg);color:var(--green);}
.badge-pro {background:rgba(240,192,64,.15);color:var(--gold-2);}

/* MOBILE sidebar toggle */
.sidebar-toggle{display:none;}
@media(max-width:680px){
  html,body{overflow:auto;}
  .classroom-body{flex-direction:column;overflow:visible;}
  .sidebar{width:100%;min-width:0;height:auto;max-height:220px;border-right:none;border-bottom:1px solid var(--border);}
  .content-area{overflow:visible;max-height:none;}
}

/* CONTENT AREA */
.content-area{flex:1;overflow-y:auto;padding:28px max(20px,4vw) 48px;}

/* CONTENT STATES */
#empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;min-height:40vh;gap:12px;
}
#empty-state .ei{font-size:3rem;}
#empty-state h2{font-size:1.3rem;}
#empty-state p{color:var(--muted);font-size:.9rem;max-width:360px;}
#topic-content{display:none;}

/* CONTENT HEADER */
.ch{margin-bottom:22px;}
.ch h2{font-size:1.6rem;margin-bottom:8px;}
.ch-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.mastery-chip{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px;}
.ch-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}

/* VIDEO BLOCK */
.video-wrap{
  aspect-ratio:16/9;background:var(--slate2);border-radius:var(--r-lg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:rgba(255,255,255,.5);margin-bottom:22px;position:relative;overflow:hidden;
  cursor:pointer;
}
.video-wrap:hover .play-btn{transform:scale(1.1);}
.play-btn{
  width:62px;height:62px;border-radius:50%;background:var(--gold);
  color:var(--ink);display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;transition:transform .2s var(--ease);margin-bottom:10px;
}
.video-lbl{font-size:.82rem;}

/* NOTES CARD */
.notes-card{
  background:var(--white);border-radius:var(--r-lg);
  border:1.5px solid var(--border);padding:22px;margin-bottom:20px;
  position:relative;overflow:hidden;
}
.notes-card h3{font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:12px;}
.notes-card p{font-size:.9rem;line-height:1.72;color:var(--ink);}
.formula-box{
  background:var(--slate);color:#fff;border-radius:var(--r);
  padding:13px 16px;font-family:monospace;font-size:.92rem;
  margin:14px 0;line-height:1.6;letter-spacing:.01em;
  overflow-x:auto;
}

/* LOCK OVERLAY */
.lock-overlay{
  position:absolute;inset:0;z-index:10;
  background:rgba(248,246,240,.92);backdrop-filter:blur(5px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:24px;border-radius:inherit;
}
.lock-overlay h3{margin:10px 0 6px;font-size:1.1rem;}
.lock-overlay p{font-size:.84rem;color:var(--muted);margin-bottom:16px;max-width:300px;}

/* QUIZ */
.quiz-card{
  background:var(--white);border-radius:var(--r-lg);
  border:1.5px solid var(--border);padding:22px;
}
.quiz-card h3{font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:16px;}
.quiz-prog{font-size:.75rem;color:var(--muted);margin-bottom:12px;}
.quiz-q{font-size:.95rem;font-weight:600;margin-bottom:14px;line-height:1.55;}
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.quiz-opt{
  padding:11px 15px;border-radius:var(--r);border:1.5px solid var(--border);
  background:none;font-family:var(--ff-b);font-size:.88rem;text-align:left;
  cursor:pointer;transition:all .15s;color:var(--ink);
}
.quiz-opt:hover:not(:disabled){border-color:var(--gold);}
.quiz-opt.correct{border-color:var(--green);background:var(--green-bg);font-weight:700;}
.quiz-opt.wrong  {border-color:var(--red);  background:var(--red-bg);}
.quiz-opt:disabled{cursor:default;}
.quiz-exp{
  font-size:.84rem;line-height:1.65;padding:11px 14px;
  background:rgba(22,163,74,.06);border:1px solid rgba(22,163,74,.18);
  border-radius:var(--r);display:none;margin-bottom:10px;
}
.quiz-exp.show{display:block;}
.quiz-nav{display:flex;justify-content:space-between;align-items:center;gap:8px;}

/* TOAST */
#toast{
  position:fixed;bottom:20px;left:50%;z-index:9999;
  transform:translateX(-50%) translateY(calc(100%+24px));
  background:var(--slate);color:#fff;
  padding:10px 22px;border-radius:50px;font-size:.84rem;font-weight:700;
  white-space:nowrap;pointer-events:none;
  transition:transform .3s var(--ease);
  box-shadow:0 6px 24px rgba(0,0,0,.2);
}
#toast.show{transform:translateX(-50%) translateY(0);}
/* DEFAULTER BANNER */
.defaulter-banner{display:none;background:#fef2f2;border-bottom:2px solid #ef4444;padding:10px 20px;text-align:center;font-size:.86rem;font-weight:600;color:#dc2626;flex-shrink:0;}
.defaulter-banner.show{display:block;}
.defaulter-banner a{color:#1a56ff;text-decoration:underline;margin-left:8px;}
/* AUTH MODAL */
.modal-backdrop{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:16px;}
.modal-backdrop.open{display:flex;}
.modal{background:#f7f9fc;border-radius:18px;padding:32px 28px;width:100%;max-width:400px;box-shadow:0 24px 80px rgba(0,0,0,.3);animation:modalIn .22s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-head h2{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.05em;color:#0d1117;}
.modal-close-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;color:#6b7280;}
.modal-tab-row{display:flex;background:rgba(0,0,0,.06);border-radius:8px;padding:4px;margin-bottom:20px;}
.modal-tab-btn{flex:1;padding:8px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.875rem;border-radius:6px;cursor:pointer;color:#6b7280;transition:all .18s;}
.modal-tab-btn.active{background:#fff;color:#0d1117;box-shadow:0 1px 5px rgba(0,0,0,.1);}
.modal-form-group{margin-bottom:12px;}
.modal-form-group label{display:block;font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:#6b7280;margin-bottom:4px;}
.modal-form-group input{width:100%;padding:10px 13px;border:1.5px solid rgba(0,0,0,.1);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.9rem;background:#f7f9fc;transition:border-color .15s;}
.modal-form-group input:focus{outline:none;border-color:#1a56ff;background:#fff;}
.modal-auth-msg{font-size:.82rem;margin-bottom:10px;padding:8px 12px;border-radius:7px;display:none;}
.modal-auth-msg.error{background:rgba(239,68,68,.08);color:#dc2626;}
.modal-auth-msg.success{background:rgba(0,201,122,.08);color:#059669;}
.modal-auth-msg.visible{display:block;}
.modal-submit-btn{width:100%;padding:12px;background:#1a56ff;color:white;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;transition:opacity .2s;}
.modal-submit-btn:hover{opacity:.9;}
</style>
</head>

/* ── INIT ── */
function waitForSB(cb) {
  if (typeof window.supabase!=='undefined'){ cb(); }
  else{ setTimeout(()=>waitForSB(cb),100); }
}
waitForSB(async()=>{
  sb=window.supabase.createClient(SUPA_URL, SUPA_KEY);
  const {data:{session}}=await sb.auth.getSession();
  currentUser=session?.user??null;
  if (currentUser){
    const [p,m]=await Promise.all([
      sb.from('profiles').select('*').eq('id',currentUser.id).single(),
      sb.from('topic_mastery').select('topic_id,mastery_level').eq('user_id',currentUser.id)
    ]);
    currentProfile=p.data;
    (m.data||[]).forEach(r=>{ masteryMap[r.topic_id]=r.mastery_level; });
  }
  setSubject(currentSubject);
});

/* ── SIDEBAR ── */
function setSubject(subj) {
  currentSubject = subj;
  document.querySelectorAll('.subj-tab').forEach(b=>{
    b.classList.toggle('active',
      (subj==='mathematics'&&b.textContent.includes('Math'))||
      (subj==='physics'&&b.textContent.includes('Physics'))||
      (subj==='english'&&b.textContent.includes('English'))
    );
  });
  renderTopicList();
}

function renderTopicList() {
  const topics = CURRICULUM[currentSubject]?.topics || [];
  const scroll = document.getElementById('topic-scroll');
  scroll.innerHTML = topics.map(t=>{
    const acc = masteryMap[t.id];
    const dot = acc>=0.70?'var(--green)':acc>=0.40?'var(--gold)':acc>0?'var(--red)':'rgba(12,12,20,.18)';
    return `<div class="topic-item${currentTopicId===t.id?' active':''}" onclick="openTopic('${t.id}')" role="button" tabindex="0">
      <div class="ti-left">
        <div class="mastery-dot" style="background:${dot}"></div>
        <span class="ti-name">${t.title}</span>
      </div>
      <span class="badge ${t.premium?'badge-pro':'badge-free'}">${t.premium?'PRO':'FREE'}</span>
    </div>`;
  }).join('');
}

/* ── OPEN TOPIC ── */
function openTopic(topicId) {
  currentTopicId = topicId;
  const topics = CURRICULUM[currentSubject]?.topics||[];
  const t = topics.find(x=>x.id===topicId);
  if (!t) return;

  const isPremiumLocked = t.premium && !currentProfile?.is_premium;
  const acc = masteryMap[topicId];
  const accColor = acc>=0.70?'var(--green)':acc>=0.40?'var(--gold-2)':acc>0?'var(--red)':'var(--muted)';
  const accBg = acc>=0.70?'rgba(22,163,74,.1)':acc>=0.40?'rgba(240,192,64,.12)':acc>0?'rgba(220,38,38,.1)':'rgba(12,12,20,.05)';

  quizState = {idx:0, answered:{}};
  document.getElementById('empty-state').style.display='none';
  const tc = document.getElementById('topic-content');
  tc.style.display='block';

  tc.innerHTML=`
    <div class="ch">
      <h2>${t.title}</h2>
      <div class="ch-meta">
        <span style="font-size:.8rem;color:var(--muted);text-transform:capitalize">${currentSubject}</span>
        ${acc!==undefined?`<span class="mastery-chip" style="background:${accBg};color:${accColor}">${Math.round(acc*100)}% Mastery</span>`:''}
      </div>
      <div class="ch-actions">
        <a href="cbt.html?subject=${currentSubject}" class="btn btn-outline btn-sm">📝 Full Mock Exam</a>
        <a href="dashboard.html" class="btn btn-outline btn-sm">📊 Dashboard</a>
        ${topics.findIndex(x=>x.id===topicId)<topics.length-1
          ? `<button class="btn btn-gold btn-sm" onclick="nextTopic()">Next Topic →</button>`:''}
      </div>
    </div>

    <!-- VIDEO -->
    <div class="video-wrap${isPremiumLocked?' locked-parent':''}" onclick="this.querySelector('.play-btn').textContent='⏸'">
      <div class="play-btn">▶</div>
      <div class="video-lbl">🎬 ${t.title} — Video Masterclass</div>
      ${isPremiumLocked?`<div class="lock-overlay">
        <div style="font-size:2rem;margin-bottom:8px">🔒</div>
        <h3>Premium Video</h3>
        <p>Unlock all video masterclasses with Mastery Pro.</p>
        <a href="index.html#pricing" class="btn btn-gold btn-sm">Unlock — ₦2,500</a>
      </div>`:''}
    </div>

    <!-- NOTES -->
    <div class="notes-card${isPremiumLocked?' relative':''}">
      <h3>📌 Key Concepts</h3>
      <p>${t.notes}</p>
      <h3 style="margin-top:18px">Key Formula</h3>
      <div class="formula-box">${t.formula.replace(/\n/g,'<br>')}</div>
      ${isPremiumLocked?`<div class="lock-overlay">
        <div style="font-size:1.5rem;margin-bottom:8px">🔒</div>
        <h3>Premium Notes</h3>
        <p>Full explanations, worked examples, and shortcut formulas.</p>
        <a href="index.html#pricing" class="btn btn-gold btn-sm">Unlock — ₦2,500</a>
      </div>`:''}
    </div>

    <!-- QUIZ -->
    <div class="quiz-card" id="quiz-card">
      <h3>Topic Quiz</h3>
      <div id="quiz-body"></div>
    </div>
  `;

  renderTopicList();
  renderQuiz(t);
}

/* ── QUIZ ── */
function renderQuiz(t) {
  const body=document.getElementById('quiz-body');
  if (!body) return;
  const qs=t.questions;
  const i=quizState.idx;

  if (i>=qs.length) {
    const cor=Object.values(quizState.answered).filter(Boolean).length;
    body.innerHTML=`
      <div style="text-align:center;padding:20px 0">
        <div style="font-size:2rem;margin-bottom:8px">${cor===qs.length?'🎉':'📈'}</div>
        <div style="font-family:var(--ff-h);font-size:1.4rem;font-weight:800">${cor}/${qs.length} Correct</div>
        <p style="color:var(--muted);font-size:.85rem;margin:8px 0 18px">${cor===qs.length?'Perfect! You nailed it.':cor>=qs.length*0.6?'Good effort. Review the wrong ones.':'Keep practising — drill mode will help.'}</p>
        <button class="btn btn-gold btn-sm" onclick="retryQuiz()">Retry Quiz</button>
        <a href="cbt.html?subject=${currentSubject}" class="btn btn-outline btn-sm" style="margin-left:8px">Full Exam →</a>
      </div>`;
    if (currentUser && sb) saveQuizMastery(t.id, cor, qs.length);
    return;
  }

  const q=qs[i];
  body.innerHTML=`
    <div class="quiz-prog">Question ${i+1} of ${qs.length}</div>
    <div class="quiz-q">${q.q}</div>
    <div class="quiz-opts" id="q-opts">
      ${q.opts.map((o,idx)=>`<button class="quiz-opt" onclick="answerQuiz(${idx})">${o}</button>`).join('')}
    </div>
    <div class="quiz-exp" id="q-exp"></div>
    <div class="quiz-nav">
      <span style="font-size:.75rem;color:var(--muted)">${Object.keys(quizState.answered).length} answered</span>
      <button class="btn btn-gold btn-sm" id="q-next" style="display:none" onclick="nextQuizQ()">Next →</button>
    </div>
  `;
}

function answerQuiz(optIdx) {
  const topics=CURRICULUM[currentSubject]?.topics||[];
  const t=topics.find(x=>x.id===currentTopicId);
  const q=t.questions[quizState.idx];
  quizState.answered[quizState.idx]=(optIdx===q.correct);

  document.querySelectorAll('.quiz-opt').forEach((b,i)=>{
    b.disabled=true;
    if (i===q.correct) b.classList.add('correct');
    else if (i===optIdx) b.classList.add('wrong');
  });
  const exp=document.getElementById('q-exp');
  exp.textContent='💡 '+q.exp; exp.classList.add('show');
  document.getElementById('q-next').style.display='inline-flex';
}

function nextQuizQ(){
  quizState.idx++;
  const t=CURRICULUM[currentSubject]?.topics?.find(x=>x.id===currentTopicId);
  renderQuiz(t);
}
function retryQuiz(){
  quizState={idx:0,answered:{}};
  const t=CURRICULUM[currentSubject]?.topics?.find(x=>x.id===currentTopicId);
  renderQuiz(t);
}

async function saveQuizMastery(topicId, correct, total){
  const acc=Math.round(correct/total*100);
  const mastery=parseFloat((acc/100*0.7 + Math.min(total/50,1)*0.3).toFixed(3));
  await sb.from('topic_mastery').upsert({
    user_id:currentUser.id, topic_id:topicId,
    accuracy_avg:acc,
    questions_solved:total,
    mastery_level:mastery,
    last_studied:new Date().toISOString()
  },{onConflict:'user_id,topic_id'});
  masteryMap[topicId]=mastery;
  renderTopicList();
}

function nextTopic(){
  const topics=CURRICULUM[currentSubject]?.topics||[];
  const idx=topics.findIndex(t=>t.id===currentTopicId);
  if (idx<topics.length-1) openTopic(topics[idx+1].id);
}

/* ── TOAST ── */
function toast(msg,ms=3000){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),ms);
}

/* ── SUBSCRIPTION EXPIRY CHECK ── */
function checkSubscriptionExpiry(profile){
  if(!profile?.is_premium) return;
  const expiry=profile.subscription_expiry?new Date(profile.subscription_expiry):null;
  if(expiry && new Date()>expiry){
    document.getElementById('defaulter-banner').classList.add('show');
  }
}
</script>
