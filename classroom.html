<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom — UltimateEdge</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .classroom-layout { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; }
        .sidebar { background: #fff; border-right: 1px solid var(--border); overflow-y: auto; height: 100vh; position: sticky; top: 0; }
        .topic-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid var(--border); transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .topic-item:hover { background: var(--bg); }
        .topic-item.active { background: var(--surface2); border-left: 4px solid var(--accent); }
        .video-area { background: #000; aspect-ratio: 16/9; position: relative; }
        .video-embed { width: 100%; height: 100%; border: none; display: none; }
        .locked-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
        .locked-overlay.show { display: flex; }
        @media (max-width: 768px) { .classroom-layout { grid-template-columns: 1fr; } .sidebar { height: auto; } }
    </style>
</head>
<body>
    <div class="classroom-layout">
        <aside class="sidebar">
            <div style="padding: 20px; border-bottom: 1px solid var(--border);">
                <h2 id="sideSubject" style="font-family: 'Bebas Neue';">Loading...</h2>
                <div class="progress-bar" style="height:4px; background:#eee; margin-top:10px;">
                    <div id="progFill" style="height:100%; background:var(--accent); width: 0%;"></div>
                </div>
            </div>
            <div id="topicList"></div>
        </aside>

        <main class="main-content">
            <div class="video-area">
                <div id="placeholder" style="color:#fff; text-align:center; padding-top:20%;">
                    <button onclick="playVideo()" style="padding: 15px 30px; border-radius: 50px; background: var(--accent); color: #fff; border: none; cursor: pointer; font-size: 1.2rem;">▶ Start Lesson</button>
                </div>
                <iframe id="videoEmbed" class="video-embed" allowfullscreen allow="autoplay"></iframe>
                <div id="lockOverlay" class="locked-overlay">
                    <h3>Premium Content 🔒</h3>
                    <a href="index.html#pricing" style="color: var(--accent);">Upgrade to Unlock</a>
                </div>
            </div>

            <div style="padding: 30px;">
                <h1 id="lessonTitle">Select a Topic</h1>
                <p id="lessonNotes"></p>
                <ul id="keyPoints"></ul>
            </div>
        </main>
    </div>

    <script>
        let data = {};
        let activeTopic = null;

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const subj = params.get('subject') || 'mathematics';
            
            try {
                const res = await fetch('data/curriculum.json');
                data = await res.json();
                renderSidebar(subj);
            } catch (e) { console.error("Data Load Failed"); }
        }

        function renderSidebar(subj) {
            const syllabus = data[subj];
            document.getElementById('sideSubject').textContent = syllabus.label;
            const container = document.getElementById('topicList');
            container.innerHTML = '';

            syllabus.sections.forEach(sec => {
                sec.topics.forEach(topic => {
                    const div = document.createElement('div');
                    div.className = 'topic-item';
                    div.id = `item-${topic.id}`;
                    div.innerHTML = `<span>${topic.free ? '▶' : '🔒'}</span> ${topic.name}`;
                    div.onclick = () => selectTopic(topic);
                    container.appendChild(div);
                });
            });
        }

        function selectTopic(topic) {
            activeTopic = topic;
            document.querySelectorAll('.topic-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`item-${topic.id}`).classList.add('active');
            
            document.getElementById('lessonTitle').textContent = topic.name;
            document.getElementById('lessonNotes').textContent = topic.notes;
            document.getElementById('lockOverlay').classList.toggle('show', !topic.free);
            document.getElementById('videoEmbed').style.display = 'none';
            document.getElementById('placeholder').style.display = 'block';
        }

        function playVideo() {
            if (!activeTopic) return;
            const embed = document.getElementById('videoEmbed');
            embed.src = activeTopic.videoUrl;
            embed.style.display = 'block';
            document.getElementById('placeholder').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
