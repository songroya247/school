<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="ue-nav">
        <div class="ue-nav__brand">ULTIMATE<span>EDGE</span></div>
        <div class="ue-nav__right">
            <span id="nav-xp">0 XP</span>
            <div id="nav-user-pill" style="display:none"><span id="nav-user-name"></span></div>
        </div>
    </nav>
    <main class="container mt-lg">
        <h1 class="section-title">Your Progress</h1>
        <div class="grid-3 mt-lg">
            <div class="card card--blue text-center">
                <p>JAMB ESTIMATE</p>
                <h2 id="res-jamb" style="font-size:2.5rem">NIL</h2>
            </div>
            <div class="card text-center">
                <p>WAEC GRADE</p>
                <h2 id="res-waec" style="font-size:2.5rem">NIL</h2>
            </div>
            <div class="card">
                <p>COMMITMENT</p>
                <h2 id="res-comm">0</h2>
            </div>
        </div>
        <div class="card mt-lg">
            <h3>🧭 SmartPath Tips</h3>
            <div id="smartpath-list" class="mt"></div>
        </div>
    </main>
    <script src="/js/auth.js"></script>
    <script src="/js/ai-engine.js"></script>
    <script>
        window.addEventListener('ue_auth_ready', async () => {
            const acc = currentProfile.accuracy_avg;
            document.getElementById('res-jamb').textContent = window.predictJAMB(acc);
            document.getElementById('res-waec').textContent = window.predictWAEC(acc);
            
            const { data: tm } = await sb.from('topic_mastery').select('*').eq('user_id', currentUser.id).limit(3);
            document.getElementById('smartpath-list').innerHTML = tm.map(t => `<div class="card" style="margin-bottom:10px">${t.topic_id.toUpperCase()} - ${Math.round(t.accuracy_avg)}%</div>`).join('');
        });
    </script>
</body>
</html>
