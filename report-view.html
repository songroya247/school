<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance Report – UltimateEdge</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ai-engine.js"></script>
</head>
<body>
<main class="report-a4" id="report-content">
  <h1>UltimateEdge Performance Report</h1>
  <div id="report-data">Loading...</div>
</main>
<button onclick="window.print()" class="btn btn-primary" style="margin:20px; display:block; margin-left:auto;">Print / Save PDF</button>
<script>
  const token = new URLSearchParams(location.search).get('token');
  if(!token) document.getElementById('report-data').innerHTML = 'No token provided.';
  else {
    (async () => {
      const { data: profile } = await sb.from('profiles').select('*').eq('report_share_token', token).single();
      if(!profile) return;
      const { data: topics } = await sb.from('topic_mastery').select('*').eq('user_id', profile.id);
      let html = `<h2>${profile.full_name}</h2><p>Target Score: ${profile.target_jamb_score}</p><p>Overall Readiness: ${profile.accuracy_avg || 'NIL'}%</p><h3>Weakness Map</h3><table border="1"><tr><th>Topic</th><th>Accuracy</th></tr>`;
      topics.forEach(t => { html += `<tr><td>${t.topic_id}</td><td>${t.accuracy_avg === null ? 'NIL' : t.accuracy_avg+'%'}</td></tr>`; });
      html += `</table><p>Predicted JAMB: ${predictJAMB(profile.accuracy_avg)}</p><p>Predicted WAEC: ${predictWAEC(profile.accuracy_avg)}</p>`;
      document.getElementById('report-data').innerHTML = html;
    })();
  }
</script>
</body>
</html>
