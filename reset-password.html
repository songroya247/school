<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set New Password — UE School</title>
<link rel="stylesheet" href="css/main.css">
<style>
body { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); padding:24px; }
.auth-card {
  background:var(--surface); border:1.5px solid var(--border); border-radius:18px;
  box-shadow:var(--shadow-lg); max-width:460px; width:100%; padding:40px;
}
.auth-logo { font-family:var(--font-head); font-size:1.6rem; color:var(--accent); letter-spacing:.07em; display:block; text-align:center; margin-bottom:28px; }
#auth-error { display:none; background:#fee2e2; color:#991b1b; padding:12px 16px; border-radius:8px; font-size:.88rem; font-weight:600; margin-bottom:16px; border:1px solid #fca5a5; }
.spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:6px; }
@keyframes spin { to { transform:rotate(360deg); } }
.password-wrap { position:relative; }
.password-wrap .form-input { padding-right:44px; }
.pw-toggle { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:1.1rem; color:var(--muted); padding:0; line-height:1; }
.strength-bar { height:3px; border-radius:999px; margin-top:6px; transition:all .3s; }
.strength-weak   { background:#ef4444; width:30%; }
.strength-fair   { background:#f59e0b; width:60%; }
.strength-strong { background:#22c55e; width:100%; }

#state-invalid { display:none; text-align:center; }
</style>
</head>
<body>

<div style="display:flex;flex-direction:column;align-items:center;width:100%">
  <a href="index.html" class="auth-logo">UE School</a>

  <div class="auth-card">
    <div id="auth-error"></div>

    <!-- Checking token state -->
    <div id="state-checking" style="text-align:center;padding:24px 0">
      <div style="font-size:2rem;margin-bottom:12px">🔐</div>
      <p style="color:var(--muted)">Verifying your reset link…</p>
    </div>

    <!-- Reset form -->
    <div id="reset-form" style="display:none">
      <h2 style="font-family:var(--font-head);font-size:1.9rem;margin-bottom:6px">Set New Password</h2>
      <p style="font-size:.88rem;color:var(--muted);margin-bottom:24px">
        Choose a strong password for your account.
      </p>

      <div class="form-group">
        <label class="form-label">New Password</label>
        <div class="password-wrap">
          <input type="password" class="form-input" placeholder="Min. 8 characters"
                 id="new-pass" autocomplete="new-password" oninput="checkStrength(this.value)">
          <button type="button" class="pw-toggle" onclick="togglePw('new-pass',this)">👁</button>
        </div>
        <div class="strength-bar" id="strength-bar" style="display:none"></div>
        <div class="form-hint" id="strength-label"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <div class="password-wrap">
          <input type="password" class="form-input" placeholder="Repeat password"
                 id="new-pass2" autocomplete="new-password">
          <button type="button" class="pw-toggle" onclick="togglePw('new-pass2',this)">👁</button>
        </div>
      </div>

      <button class="btn btn-primary btn-block btn-lg" id="btn-reset" onclick="doReset()">
        Set New Password
      </button>
    </div>

    <!-- Invalid/expired link -->
    <div id="state-invalid">
      <div style="font-size:3rem;margin-bottom:16px">⚠️</div>
      <h2 style="font-family:var(--font-head);font-size:1.8rem;margin-bottom:12px">Link Expired</h2>
      <p style="font-size:.92rem;color:var(--muted);line-height:1.7;margin-bottom:24px">
        This password reset link has expired or is invalid.<br>
        Please request a new one.
      </p>
      <a href="forgot-password.html" class="btn btn-primary btn-block">Request New Link</a>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>

<script>
window.sb = window.supabase.createClient(
  'https://hazwqyvnolgdkokehjhr.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhendxeXZub2xnZGtva2VoamhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDUwNzYsImV4cCI6MjA5MTY4MTA3Nn0.V7TsNcfpib2HtJRjTASyJPavQ8qUR2R4KXYuWdZB4gE'
);

// Supabase puts the recovery token in the URL hash when redirecting here.
// The SDK handles it via onAuthStateChange with 'PASSWORD_RECOVERY'.
window.sb.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    // Token valid — show the form
    document.getElementById('state-checking').style.display = 'none';
    document.getElementById('reset-form').style.display     = 'block';
  }
});

// If no recovery event fires within 3 seconds, show invalid state
setTimeout(() => {
  if (document.getElementById('state-checking').style.display !== 'none') {
    document.getElementById('state-checking').style.display = 'none';
    document.getElementById('state-invalid').style.display  = 'block';
  }
}, 3000);

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type  = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function checkStrength(pw) {
  const bar   = document.getElementById('strength-bar');
  const label = document.getElementById('strength-label');
  bar.style.display = pw.length ? 'block' : 'none';
  if (pw.length < 6)        { bar.className = 'strength-bar strength-weak';   label.textContent = 'Weak'; label.style.color = '#ef4444'; }
  else if (pw.length < 10)  { bar.className = 'strength-bar strength-fair';   label.textContent = 'Fair'; label.style.color = '#f59e0b'; }
  else                      { bar.className = 'strength-bar strength-strong'; label.textContent = 'Strong ✓'; label.style.color = '#22c55e'; }
}

async function doReset() {
  const pass  = document.getElementById('new-pass').value;
  const pass2 = document.getElementById('new-pass2').value;
  const err   = document.getElementById('auth-error');

  if (pass.length < 8) {
    err.textContent = 'Password must be at least 8 characters.';
    err.style.display = 'block'; return;
  }
  if (pass !== pass2) {
    err.textContent = 'Passwords do not match.';
    err.style.display = 'block'; return;
  }
  err.style.display = 'none';
  await AUTH.handleResetPassword(pass);
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
</script>
</body>
</html>
