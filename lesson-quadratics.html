<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Lesson: Quadratic Equations</title>
<link href="https://fonts.googleapis.com/css2?family=STIX+Two+Text:ital,wght@0,400;0,700;1,400&family=Share+Tech+Mono&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* IFRAME OPTIMIZATION: Remove margins and prevent internal scrolling */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #000; /* Match classroom player background */
  overflow: hidden; 
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100vw;
  height: 100vh;
  font-family: 'DM Sans', sans-serif;
  color: #fff;
}

#lessonWrap {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* HEADER BAR */
.lesson-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px 8px;
  background: #0a0f1a;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.lesson-subject {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #1a56ff;
  font-family: 'Share Tech Mono', monospace;
}
.lesson-title-text {
  font-size: 0.8rem;
  font-weight: 600;
  color: rgba(255,255,255,0.7);
}

/* CANVAS CONTAINER */
#canvasWrap {
  position: relative;
  flex: 1;
  width: 100%;
  background: #0d1117;
  cursor: pointer;
  overflow: hidden;
}
canvas#c {
  width: 100%;
  height: 100%;
  display: block;
}

/* BIG PLAY BUTTON OVERLAY */
#bigPlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.5);
  transition: opacity .25s;
}
#bigPlay.hidden { opacity: 0; pointer-events: none; }
.big-play-circle {
  width: 70px; height: 70px; border-radius: 50%;
  background: rgba(26,86,255,0.9);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem;
  box-shadow: 0 0 30px rgba(26,86,255,0.4);
}

/* CAPTION BOX */
#captionBox {
  position: absolute; bottom: 20px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(8px);
  border-radius: 6px;
  padding: 8px 20px;
  font-size: 0.85rem;
  color: #fff;
  max-width: 85%;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.1);
  pointer-events: none;
  transition: opacity 0.3s;
}
#captionBox.hidden { opacity: 0; }

/* CONTROLS BAR */
#controls {
  background: #111827;
  padding: 10px 20px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.progress-wrap { display: flex; align-items: center; gap: 12px; }
.time-label { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: rgba(255,255,255,0.4); min-width: 35px; }
.seek-bar { flex: 1; accent-color: #1a56ff; height: 4px; cursor: pointer; }

.btn-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.ctrl-btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem;
  padding: 6px 12px;
  border-radius: 4px;
  cursor: pointer;
}
.ctrl-btn.primary { background: rgba(26,86,255,0.25); border-color: #1a56ff; color: #7ba7ff; }
.active-speed { background: #1a56ff !important; color: #fff !important; }

#scene-dots { display: flex; gap: 6px; flex: 1; justify-content: center; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.2); cursor: pointer; }
.dot.active { background: #1a56ff; transform: scale(1.3); }

#voiceStatus { font-size: 0.65rem; font-family: 'Share Tech Mono', monospace; display: flex; align-items: center; gap: 6px; cursor: pointer; color: rgba(255,255,255,0.5); }
.voice-dot { width: 6px; height: 6px; border-radius: 50%; background: #00c97a; }
.muted .voice-dot { background: #555; }
</style>
</head>
<body>

<div id="lessonWrap">
  <div class="lesson-header">
    <div>
      <div class="lesson-subject">Math · Quadratics</div>
      <div class="lesson-title-text">Quadratic Equations Mastery</div>
    </div>
  </div>

  <div id="canvasWrap" onclick="handleCanvasClick()">
    <canvas id="c"></canvas>
    <div id="bigPlay"><div class="big-play-circle">▶</div></div>
    <div id="captionBox" class="hidden"></div>
  </div>

  <div id="controls">
    <div class="progress-wrap">
      <span class="time-label" id="timeElapsed">0:00</span>
      <input type="range" class="seek-bar" id="seekBar" min="0" max="1000" value="0" oninput="onSeek(this.value)">
      <span class="time-label" id="timeTotal">0:00</span>
    </div>
    <div class="btn-row">
      <button class="ctrl-btn" onclick="prevScene()">◀</button>
      <button class="ctrl-btn primary" id="btnPlay" onclick="togglePlay()">PLAY</button>
      <button class="ctrl-btn" onclick="nextScene()">▶</button>
      <div id="scene-dots"></div>
      <div class="ctrl-btn" id="sp10" onclick="setSpeed(1)">1×</div>
      <div id="voiceStatus" onclick="toggleVoice()">
        <div class="voice-dot"></div> <span id="voiceLabel">VOICE ON</span>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 900, H = 506;
canvas.width = W; canvas.height = H;

const C = { bg:'#0d1117', accent:'#1a56ff', gold:'#f4a820', green:'#00c97a', white:'#f0f0f0', cyan:'#58c4dc' };

// VOICE NARRATIONS
const NARRATIONS = [
  "Welcome to UltimateEdge School. Today, we master Quadratic Equations for JAMB and WAEC.",
  "A quadratic equation is in the form: a x squared plus b x plus c equals zero. The highest power of x is 2.",
  "Method 1: Factorization. We find two numbers that multiply to give a times c and add to give b.",
  "Method 2: The Quadratic Formula. This works for every equation. Memorize the formula shown on screen.",
  "JAMB Shortcut: The sum of roots is negative b over a, and the product of roots is c over a.",
  "Example: For 3x squared minus 7x plus 2 equals zero, factoring gives us x equals 2 or x equals one-third."
];

const CAPTIONS = [
  "Quadratic Equations Mastery",
  "Standard Form: ax² + bx + c = 0",
  "Factorization: Find factors of (a × c) that add to (b)",
  "Formula: x = (−b ± √(b²−4ac)) / 2a",
  "Sum: −b/a  |  Product: c/a",
  "Result: x = 2 or x = ⅓ (Option A)"
];

let sceneIdx = 0, sceneT = 0, playing = false, playSpeed = 1, voiceOn = true;

// UTILS
function txt(str,x,y,sz,col,align='center'){
  ctx.fillStyle=col; ctx.font=`${sz}px "STIX Two Text", serif`; ctx.textAlign=align; ctx.fillText(str,x,y);
}

function renderFrame(t) {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);
  
  // Basic Visuals based on sceneIdx
  txt(CAPTIONS[sceneIdx], W/2, H/2, 40, C.white);
  if(sceneIdx === 1) txt("ax² + bx + c = 0", W/2, H/2 + 60, 30, C.gold);
}

function updateUI() {
  document.getElementById('btnPlay').textContent = playing ? 'PAUSE' : 'PLAY';
  document.getElementById('bigPlay').classList.toggle('hidden', playing);
  document.getElementById('captionBox').textContent = CAPTIONS[sceneIdx];
  document.getElementById('captionBox').classList.toggle('hidden', !playing);
  
  const dots = document.getElementById('scene-dots');
  dots.innerHTML = '';
  NARRATIONS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === sceneIdx ? ' active' : '');
    d.onclick = () => { sceneIdx = i; sceneT = 0; updateUI(); if(!playing) renderFrame(0); };
    dots.appendChild(d);
  });
}

function togglePlay() { 
  playing = !playing; 
  updateUI(); 
  if(playing) {
    if(voiceOn) speak(NARRATIONS[sceneIdx]);
    requestAnimationFrame(animate); 
  } else {
    speechSynthesis.cancel();
  }
}

function animate() {
  if(!playing) return;
  sceneT += 0.005 * playSpeed;
  if(sceneT >= 1) {
    sceneT = 0;
    if(sceneIdx < NARRATIONS.length - 1) {
      sceneIdx++;
      if(voiceOn) speak(NARRATIONS[sceneIdx]);
    } else {
      playing = false;
    }
    updateUI();
  }
  renderFrame(sceneT);
  document.getElementById('seekBar').value = ((sceneIdx + sceneT) / NARRATIONS.length) * 1000;
  requestAnimationFrame(animate);
}

function speak(text) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = playSpeed;
  speechSynthesis.speak(u);
}

function toggleVoice() {
  voiceOn = !voiceOn;
  document.getElementById('voiceStatus').classList.toggle('muted', !voiceOn);
  document.getElementById('voiceLabel').textContent = voiceOn ? 'VOICE ON' : 'VOICE OFF';
  if(!voiceOn) speechSynthesis.cancel();
  else if(playing) speak(NARRATIONS[sceneIdx]);
}

function handleCanvasClick() { togglePlay(); }
function prevScene() { sceneIdx = Math.max(0, sceneIdx - 1); sceneT = 0; updateUI(); renderFrame(0); }
function nextScene() { sceneIdx = Math.min(NARRATIONS.length - 1, sceneIdx + 1); sceneT = 0; updateUI(); renderFrame(0); }

updateUI();
renderFrame(0);
document.getElementById('timeTotal').textContent = "1:30";
</script>
</body>
</html>
