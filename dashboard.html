<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — UltimateEdge School</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="defaulter-banner" id="defaulter-banner">
    ⚠️ Your subscription has expired. <a href="index.html#pricing">Renew Now →</a>
  </div>

  <nav class="ue-nav">
    <a class="ue-nav__brand" href="/index.html">ULTIMATE<span>EDGE</span></a>
    <div class="ue-nav__right">
      <span id="nav-xp"></span>
      <div id="nav-user-pill" style="display:none">
        <div id="nav-avatar"></div>
        <span id="nav-user-name"></span>
      </div>
    </div>
  </nav>

  <div class="container mt-lg">
    <h1 class="text-head" style="font-size:2.5rem">Hello, <span id="greeting-name" class="text-blue">Student</span> 👋</h1>
    
    <!-- Triple Threat Panel -->
    <div class="grid-3 mt">
      <div class="card card--blue text-center">
        <p class="text-xs fw-700" style="letter-spacing:0.1em">JAMB PREDICTION</p>
        <div class="text-head" id="pred-jamb" style="font-size:3rem">NIL</div>
        <p class="text-sm">Target: <span id="target-score">280</span></p>
      </div>
      <div class="card text-center">
        <p class="text-xs fw-700 text-muted">WAEC PREDICTION</p>
        <div class="text-head" id="pred-waec" style="font-size:3rem">NIL</div>
      </div>
      <div class="card text-center">
        <p class="text-xs fw-700 text-muted">NECO PREDICTION</p>
        <div class="text-head" id="pred-neco" style="font-size:3rem">NIL</div>
      </div>
    </div>

    <!-- Chart and Stats Row -->
    <div class="grid-2 mt">
      <div class="card">
        <h3 class="text-head mb">Mastery Progress</h3>
        <canvas id="masteryChart" height="200"></canvas>
      </div>
      <div class="card">
        <h3 class="text-head mb">Commitment Score</h3>
        <div class="flex-between mb-sm">
          <span class="text-muted">Learning Activity</span>
          <strong id="commitment-score">0</strong>
        </div>
        <div class="mastery-bar"><div class="mastery-bar__fill" id="commitment-bar" style="width:0%"></div></div>
      </div>
    </div>

    <!-- SmartPath Section -->
    <div class="card mt">
      <h3 class="text-head mb">🧭 SmartPath™ Recommendations</h3>
      <div id="smartpath-list">
        <!-- Rendered by dashboard script -->
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="/js/auth.js"></script>
  <script src="/js/ai-engine.js"></script>
</body>
</html>
