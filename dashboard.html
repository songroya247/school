<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – UltimateEdge</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ai-engine.js"></script>
  <!-- no cbt-engine needed -->
</head>
<body>
<div class="defaulter-banner" id="defaulter-banner">⚠️ Your subscription has expired. Free access is still active. <a href="index.html#pricing">Renew Now →</a></div>
<nav class="ue-nav">
  <div class="nav-brand">ULTIMATE<span>EDGE</span></div>
  <div class="nav-links"><a href="index.html">Home</a><a href="classroom.html">Classroom</a><a href="cbt.html">CBT</a><a href="dashboard.html">Dashboard</a></div>
  <div class="nav-user" id="nav-user-pill"><div class="nav-avatar"></div><span id="nav-user-name"></span><span id="nav-pro-badge" class="pro-badge" style="display:none">PRO</span><span id="nav-xp"></span></div>
  <button id="nav-login-btn" onclick="openAuthModal('login')">Login / Sign Up</button>
  <button id="nav-logout-btn" style="display:none" onclick="sb.auth.signOut()">Log out</button>
</nav>
<main class="dashboard-container">
  <div class="triple-prediction">
    <div class="card"><h3>🎯 JAMB Prediction</h3><span id="jamb-pred">—</span></div>
    <div class="card"><h3>📘 WAEC Grade</h3><span id="waec-pred">—</span></div>
    <div class="card"><h3>📗 NECO Grade</h3><span id="neco-pred">—</span></div>
  </div>
  <canvas id="trend-chart" height="200" style="background: var(--dark-2); border-radius: 20px; padding: 10px;"></canvas>
  <div id="smartpath" class="card" style="margin-top: 2rem;"><h3>SmartPath™ Recommendations</h3><ul id="rec-list"></ul></div>
  <table id="mastery-table" class="card"><thead><tr><th>Topic</th><th>Accuracy</th><th>Mastery</th><th>Grade</th></tr></thead><tbody id="mastery-body"></tbody></table>
</main>
<div id="toast"></div>
<!-- Auth Modal (same snippet as index) -->
<div id="auth-modal" class="modal-backdrop" style="display:none"><div class="modal-card"><span class="modal-close" onclick="closeAuthModal()">&times;</span><div class="auth-tabs"><button class="tab-btn active" onclick="switchAuthTab('login')">Login</button><button class="tab-btn" onclick="switchAuthTab('signup')">Sign Up</button></div><div id="login-form" class="auth-form"><input type="email" id="login-email" placeholder="Email" class="form-input"><input type="password" id="login-password" placeholder="Password" class="form-input"><button class="btn btn-primary" onclick="handleLogin(event)">Login →</button></div><div id="signup-form" class="auth-form" style="display:none"><input type="text" id="signup-name" placeholder="Full Name" class="form-input"><input type="email" id="signup-email" placeholder="Email" class="form-input"><input type="password" id="signup-password" placeholder="Password (min 6 chars)" class="form-input"><div class="exam-checks"><label><input type="checkbox" value="JAMB"> JAMB</label><label><input type="checkbox" value="WAEC"> WAEC</label><label><input type="checkbox" value="NECO"> NECO</label></div><select id="signup-exam-month" class="form-select"></select><select id="signup-target-score" class="form-select"></select><button class="btn btn-primary" onclick="handleSignup(event)">Create Free Account →</button></div></div></div>
<script>
  // Populate dropdowns (same as index)
  const monthSelect = document.getElementById('signup-exam-month');
  const today = new Date();
  for(let i=1; i<=18; i++) { let d = new Date(today.getFullYear(), today.getMonth()+i, 1); monthSelect.innerHTML += `<option value="${d.toISOString().slice(0,10)}">${d.toLocaleDateString('en-NG', {year:'numeric', month:'long'})}</option>`; }
  for(let s=200; s<=320; s+=10) document.getElementById('signup-target-score').innerHTML += `<option value="${s}">${s}</option>`;

  async function loadDashboard() {
    if(!currentProfile) return;
    const overallAcc = currentProfile.accuracy_avg;
    document.getElementById('jamb-pred').innerText = predictJAMB(overallAcc);
    document.getElementById('waec-pred').innerText = predictWAEC(overallAcc);
    document.getElementById('neco-pred').innerText = predictWAEC(overallAcc);
    // Load topic mastery
    const { data: topics } = await sb.from('topic_mastery').select('*').eq('user_id', currentUser.id);
    const tbody = document.getElementById('mastery-body');
    tbody.innerHTML = '';
    let lowMastery = [];
    topics.forEach(t => {
      const acc = t.accuracy_avg === null ? 'NIL' : t.accuracy_avg.toFixed(1)+'%';
      const mastery = t.mastery_level === null ? 'NIL' : (t.mastery_level*100).toFixed(0)+'%';
      tbody.innerHTML += `<tr><td>${t.topic_id}</td><td>${acc}</td><td>${mastery}</td><td>Grade ${t.grade_level}</td></tr>`;
      if(t.mastery_level !== null && t.mastery_level < 0.6) lowMastery.push(t.topic_id);
    });
    const recList = document.getElementById('rec-list');
    recList.innerHTML = lowMastery.map(t => `<li>Review ${t} – mastery below 60%</li>`).join('');
    // Chart (mock data – from session_scores)
    const { data: sessions } = await sb.from('session_scores').select('accuracy, created_at').eq('user_id', currentUser.id).order('created_at', { ascending: true }).limit(7);
    const labels = sessions?.map(s => new Date(s.created_at).toLocaleDateString()) || [];
    const data = sessions?.map(s => s.accuracy) || [];
    new Chart(document.getElementById('trend-chart'), { type: 'line', data: { labels, datasets: [{ label: 'Accuracy %', data, borderColor: '#1a56ff', tension: 0.2 }] } });
  }
  // Wait for auth
  const checkInterval = setInterval(() => { if(currentProfile) { clearInterval(checkInterval); loadDashboard(); } }, 500);
</script>
</body>
</html>
